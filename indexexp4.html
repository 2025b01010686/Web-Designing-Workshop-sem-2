<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Result Calculator</title> 
    <script src="mainexp4.jsx"></script> 
    <style>
        * { 
    margin: 0; 
    padding: 0;} 
body { 
    background-color: #FFF8F0;} 
.backdrop { 
    width: 800px; 
    border: 1px solid #81A6C6; 
    box-shadow: 0 0 15px #AACDDC; 
    border-radius: 10px; 
    background-color: white; 
    align-self: center; 
    justify-self: center; 
    margin-top: 10%; 
    width: 500px; 
    height: auto; 
    display: flex; 
    flex-direction: column; 
    align-items: center;} 
h2 { 
    font-size: 40px; 
    margin-top: 20px; 
    margin-bottom: 10px; 
    color: #9F8383;} 
label { 
    color: #9F8383; 
    font-size: 20px; 
    margin-top: 15px; 
    margin-bottom: 3px;} 
button { 
    margin: 10px; 
    height: 30px; 
    width: 120px; 
    background-color: #AACDDC; 
    color: white; 
    border-radius: 5px; 
    border: 0; 
    margin-bottom: 20px;} 
.result { 
    padding: 15px; 
    border-radius: 8px; 
    width: 100%;} 
.result p { 
    margin: 5px 0; 
    font-family: sans-serif; 
    color: #9F8383;}
    </style>
    
</head> 
<body> 
    <div class="backdrop"> 
        <h2>Student Result Calculator</h2> 
        <label>Enter number of subjects</label><br> 
        <input type="number" id="subjects"> 
        <button onclick="calculateresult()">Calculate Result</button> 
        <div id="result"></div> 
    </div> 
</body> 
</html>
